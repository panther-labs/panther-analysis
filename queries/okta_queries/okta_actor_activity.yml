AnalysisType: saved_query
QueryName: "Okta Actor Activity"
Description: >
  All Okta system log events for a given actor.id in a time window — works for both
  human users (actor.type=User) and service applications (actor.type=PublicClientAppEntity).
  Use to walk an actor's footprint, pull lifecycle / consent / token-grant events tied
  to a service app, or audit a suspect user account. Layer additional filters on the
  result (e.g. eventType, outcome:result) as the investigation requires. Substitute
  <ACTOR_ID> with the Okta-internal actor.id (not alternateId) and <WINDOW> with a
  Panther interval (e.g. '4 h', '7 d').
Query: |-
  SELECT
      p_event_time,
      eventType,
      displayMessage,
      actor:id AS actor_id,
      actor:alternateId AS actor_alternate_id,
      actor:type AS actor_type,
      client:ipAddress AS client_ip,
      client:userAgent:rawUserAgent AS user_agent,
      authenticationContext:externalSessionId AS session_id,
      outcome:result AS outcome_result,
      outcome:reason AS outcome_reason,
      target,
      debugContext:debugData AS debug_data
  FROM panther_logs.public.okta_systemlog
  WHERE p_occurs_since('<WINDOW>')
    AND actor:id = '<ACTOR_ID>'
  ORDER BY p_event_time ASC
  LIMIT 200
