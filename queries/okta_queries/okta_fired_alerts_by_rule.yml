AnalysisType: saved_query
QueryName: "Okta Fired Alerts By Rule"
Description: >
  Entry point for any Okta rule-driven investigation. Returns fired alert signals
  for a specific detection RuleID, including p_alert_id, p_alert_creation_time,
  p_alert_severity, and the full p_alert_context (populated by okta_alert_context),
  so downstream investigation can pull actor.id, client.ipAddress, target user, and
  outcome reason without re-querying the raw event. Substitute <RULE_ID> with the
  detection RuleID (e.g. 'Okta.ServiceApp.MFA.Factor.Deactivate') and <WINDOW> with
  a Panther interval (e.g. '7 d', '30 d').
Query: |-
  SELECT
      p_event_time,
      p_alert_id,
      p_alert_creation_time,
      p_alert_severity,
      p_alert_context,
      p_any_usernames,
      p_any_ip_addresses
  FROM panther_signals.public.correlation_signals
  WHERE p_occurs_since('<WINDOW>')
    AND p_rule_id = '<RULE_ID>'
  ORDER BY p_event_time DESC
  LIMIT 50
