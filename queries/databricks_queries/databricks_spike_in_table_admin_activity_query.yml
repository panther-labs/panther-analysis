AnalysisType: scheduled_query
QueryName: "Query.Databricks.SpikeInTableAdminActivity"
Enabled: false
Description: |
  Detects abnormal spikes in admin-level query activity per user. Compares the last
  24 hours of admin DDL/DCL commands (ALTER, DROP, GRANT, REVOKE, CREATE, UPDATE on
  tables/schemas/catalogs) against the user's 30-day behavioral baseline.

  DETECTION LOGIC:
  - Z-score: daily admin query count > 2σ above the user's baseline mean
  - Volume spike: daily count > 1.5x the user's baseline mean (for low-variance users)
  - Cold-start: first-time admin activity with no prior baseline (> 5 queries threshold)

  PREREQUISITE: databricks_user_query_baseline_30d lookup table must be populated.
Query: |
  -- DATABRICKS SPIKE IN TABLE ADMIN ACTIVITY
  -- Finds users with anomalous admin query volume in the last 24 hours

  WITH recent_admin_queries AS (
      SELECT
          user_identity:email::string AS user_email,
          action_name,
          request_params:commandText::string AS command_text,
          workspace_id,
          p_event_time
      FROM panther_logs.public.databricks_audit
      WHERE p_event_time >= CURRENT_TIMESTAMP - INTERVAL '1 day'
          AND service_name IN ('sqlPermissions', 'unityCatalog', 'databrickssql')
          AND user_identity:email::string IS NOT NULL
          AND user_identity:email::string != 'System-User'
          AND (
              UPPER(request_params:commandText::string) RLIKE
                  '.*(ALTER|DROP|GRANT|REVOKE|CREATE|UPDATE|DELETE)\\s+(TABLE|SCHEMA|CATALOG|DATABASE|VIEW|FUNCTION|VOLUME|CONNECTION|STORAGE CREDENTIAL|EXTERNAL LOCATION).*'
              OR action_name IN (
                  'changeOwner', 'updatePermissions', 'setPermissions',
                  'grant', 'revoke', 'updateCatalog', 'updateSchema',
                  'updateTable', 'deleteTable', 'deleteCatalog', 'deleteSchema'
              )
          )
  ),

  recent_stats AS (
      SELECT
          user_email,
          COUNT(*) AS recent_admin_queries,
          COUNT(DISTINCT action_name) AS recent_unique_actions,
          COUNT(DISTINCT workspace_id) AS recent_unique_workspaces,
          ARRAY_AGG(DISTINCT action_name) AS action_list,
          MIN(p_event_time) AS first_event,
          MAX(p_event_time) AS last_event
      FROM recent_admin_queries
      GROUP BY user_email
  ),

  with_baseline AS (
      SELECT
          r.user_email,
          r.recent_admin_queries,
          r.recent_unique_actions,
          r.recent_unique_workspaces,
          r.action_list,
          r.first_event,
          r.last_event,

          -- Baseline
          COALESCE(b.active_days, 0) AS baseline_active_days,
          COALESCE(b.total_admin_queries, 0) AS baseline_total_admin_queries,
          ROUND(COALESCE(b.mean_admin_queries_per_day, 0), 2) AS baseline_mean_per_day,
          ROUND(COALESCE(b.stddev_admin_queries_per_day, 0), 2) AS baseline_stddev_per_day,
          COALESCE(b.max_admin_queries_per_day, 0) AS baseline_max_per_day,

          -- Z-score
          CASE
              WHEN b.active_days >= 3 AND b.stddev_admin_queries_per_day > 0
              THEN ROUND(
                  (r.recent_admin_queries - b.mean_admin_queries_per_day) /
                  b.stddev_admin_queries_per_day, 2)
              ELSE NULL
          END AS z_score_admin_queries,

          -- Ratio vs baseline mean
          CASE
              WHEN b.mean_admin_queries_per_day > 0
              THEN ROUND(r.recent_admin_queries / b.mean_admin_queries_per_day, 2)
              ELSE NULL
          END AS ratio_vs_baseline,

          -- Cold-start flag
          CASE
              WHEN b.active_days IS NULL OR b.active_days < 3 THEN TRUE
              ELSE FALSE
          END AS is_cold_start,

          -- Anomaly flags
          CASE
              -- Z-score anomaly
              WHEN b.active_days >= 3 AND b.stddev_admin_queries_per_day > 0
                  AND (r.recent_admin_queries - b.mean_admin_queries_per_day) /
                      b.stddev_admin_queries_per_day > 2
              THEN TRUE
              -- Volume spike (for low-variance users where stddev ~ 0)
              WHEN b.active_days >= 3 AND b.mean_admin_queries_per_day > 0
                  AND b.stddev_admin_queries_per_day = 0
                  AND r.recent_admin_queries > b.mean_admin_queries_per_day * 1.5
              THEN TRUE
              -- Exceeded historical max by 2x
              WHEN b.active_days >= 3 AND b.max_admin_queries_per_day > 0
                  AND r.recent_admin_queries > b.max_admin_queries_per_day * 2
              THEN TRUE
              -- Cold-start: first-time admin with significant volume
              WHEN (b.active_days IS NULL OR b.active_days < 3)
                  AND r.recent_admin_queries >= 5
              THEN TRUE
              ELSE FALSE
          END AS is_anomalous,

          -- Severity score
          ROUND(
              CASE
                  WHEN b.active_days >= 3 AND b.stddev_admin_queries_per_day > 0
                  THEN GREATEST(
                      (r.recent_admin_queries - b.mean_admin_queries_per_day) /
                      b.stddev_admin_queries_per_day, 0) * r.recent_unique_actions
                  ELSE r.recent_admin_queries * r.recent_unique_actions * 0.5
              END, 2
          ) AS anomaly_severity_score

      FROM recent_stats r
      LEFT JOIN panther_lookups.public.databricks_user_query_baseline_30d b
          ON r.user_email = b.user_email
  )

  SELECT *
  FROM with_baseline
  WHERE is_anomalous = TRUE
  ORDER BY anomaly_severity_score DESC
  LIMIT 100
Schedule:
  RateMinutes: 1440
  TimeoutMinutes: 10
Tags:
  - Databricks
  - Anomaly Detection
  - Privilege Escalation
