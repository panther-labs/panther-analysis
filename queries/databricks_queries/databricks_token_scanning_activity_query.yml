AnalysisType: scheduled_query
QueryName: "Query.Databricks.TokenScanningActivity"
Enabled: false
Description: |
  Detects anomalously low activity from API tokens across multiple IPs, indicating
  brute-force token scanning. Attackers probe stolen or guessed tokens with single
  requests from many IPs to avoid rate limits.

  DETECTION LOGIC:
  - Per-token: finds tokens with low event count per source IP (< 0.5 events/IP on average)
  - Multi-IP: requires 3+ distinct source IPs per token in 24 hours
  - Baseline: compares against user's normal IP diversity from session baseline
  - Excludes private IPs and known service agents

  PREREQUISITE: databricks_user_session_baseline_30d lookup table must be populated.
Query: |
  -- DATABRICKS TOKEN SCANNING ACTIVITY
  -- Finds tokens with suspicious low-activity-per-IP patterns

  WITH token_events AS (
      SELECT
          user_identity:email::string AS user_email,
          request_params:tokenId::string AS token_id,
          source_ip_address,
          user_agent,
          session_id,
          action_name,
          response:statusCode::int AS status_code,
          p_event_time
      FROM panther_logs.public.databricks_audit
      WHERE p_event_time >= CURRENT_TIMESTAMP - INTERVAL '1 day'
          AND (
              request_params:authenticationMethod::string = 'TOKEN'
              OR action_name = 'tokenLogin'
              OR request_params:tokenId::string IS NOT NULL
          )
          AND user_identity:email::string IS NOT NULL
          AND user_identity:email::string != 'System-User'
          -- Exclude private IPs
          AND NOT (
              source_ip_address LIKE '10.%'
              OR source_ip_address LIKE '172.16.%' OR source_ip_address LIKE '172.17.%'
              OR source_ip_address LIKE '172.18.%' OR source_ip_address LIKE '172.19.%'
              OR source_ip_address LIKE '172.2_.%' OR source_ip_address LIKE '172.30.%'
              OR source_ip_address LIKE '172.31.%'
              OR source_ip_address LIKE '192.168.%'
              OR source_ip_address LIKE '127.%'
          )
          AND user_agent NOT LIKE '%Databricks-Service%'
          AND user_agent NOT LIKE '%Databricks-Runtime%'
  ),

  token_stats AS (
      SELECT
          user_email,
          token_id,
          COUNT(*) AS total_events,
          COUNT(DISTINCT source_ip_address) AS unique_ips,
          COUNT(DISTINCT user_agent) AS unique_agents,
          -- Key metric: events per unique IP (low = scanning pattern)
          ROUND(COUNT(*) * 1.0 / NULLIF(COUNT(DISTINCT source_ip_address), 0), 2)
              AS events_per_ip,
          COUNT(CASE WHEN status_code IN (401, 403) THEN 1 END) AS failed_events,
          ROUND(COUNT(CASE WHEN status_code IN (401, 403) THEN 1 END) * 100.0 /
              NULLIF(COUNT(*), 0), 1) AS failure_rate_pct,
          ARRAY_AGG(DISTINCT source_ip_address) AS ip_list,
          MIN(p_event_time) AS first_event,
          MAX(p_event_time) AS last_event
      FROM token_events
      WHERE token_id IS NOT NULL
      GROUP BY user_email, token_id
      -- Token scanning: many IPs with few events per IP
      HAVING unique_ips >= 3 AND events_per_ip < 2.0
  ),

  with_baseline AS (
      SELECT
          t.user_email,
          t.token_id,
          t.total_events,
          t.unique_ips,
          t.unique_agents,
          t.events_per_ip,
          t.failed_events,
          t.failure_rate_pct,
          t.ip_list,
          t.first_event,
          t.last_event,

          COALESCE(b.mean_unique_ips_per_day, 0) AS baseline_mean_ips_per_day,
          COALESCE(b.stddev_unique_ips_per_day, 0) AS baseline_stddev_ips_per_day,
          COALESCE(b.active_days, 0) AS baseline_active_days,
          COALESCE(b.ip_diversity, 0) AS baseline_ip_diversity,

          -- Z-score for IP diversity
          CASE
              WHEN b.active_days >= 3 AND b.stddev_unique_ips_per_day > 0
              THEN ROUND(
                  (t.unique_ips - b.mean_unique_ips_per_day) /
                  b.stddev_unique_ips_per_day, 2)
              ELSE NULL
          END AS z_score_token_ips,

          CASE
              WHEN b.active_days IS NULL OR b.active_days < 3 THEN TRUE
              ELSE FALSE
          END AS is_cold_start,

          -- Always anomalous (query HAVING clause already filtered)
          TRUE AS is_anomalous,

          -- Severity: weight by IP count, failure rate, and low events-per-IP
          ROUND(
              t.unique_ips * (1.0 / GREATEST(t.events_per_ip, 0.1)) *
              (1 + t.failure_rate_pct / 100.0),
              2
          ) AS anomaly_severity_score

      FROM token_stats t
      LEFT JOIN panther_lookups.public.databricks_user_session_baseline_30d b
          ON t.user_email = b.user_email
  )

  SELECT *
  FROM with_baseline
  ORDER BY anomaly_severity_score DESC
  LIMIT 100
Schedule:
  RateMinutes: 60
  TimeoutMinutes: 5
Tags:
  - Databricks
  - Credential Access
  - Token Scanning
  - Anomaly Detection
