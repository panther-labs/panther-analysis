AnalysisType: rule
RuleID: "Azure.Storage.BulkCPKBlobUpload"
DisplayName: "Azure Storage Bulk CPK Blob Upload"
Filename: azure_storage_bulk_cpk_blob_upload.py
Enabled: true
Status: Experimental
LogTypes:
  - Azure.MonitorActivity
Severity: High
Threshold: 10
DedupPeriodMinutes: 60
Description: >
  Detects bulk blob re-encryption attacks against Azure Storage by tracking the number of
  distinct blob paths successfully overwritten via PutBlob from the same storage account
  and caller IP address within a short timeframe. Ransomware actors use Customer-Provided
  Key (CPK) encryption to overwrite many blobs in rapid succession, holding data hostage
  while only they possess the decryption key. This rule provides early-warning detection
  before legitimate users trigger CPK access errors, complementing
  Azure.Storage.BlobUpload.FOLLOWED-BY.CPKEncryptionError which requires the victim-side
  error to confirm the attack.
Runbook: |
  1. Query Azure MonitorActivity for all PutBlob events from callerIpAddress against properties.accountName in the 6 hours before the alert to determine the full set of affected blob paths and whether properties.objectKey values follow a ransomware renaming pattern (e.g., .ENCRYPTED extensions)
  2. Check Azure AD sign-in logs for authentication events from callerIpAddress in the 24 hours before the first upload to determine if credentials were compromised prior to the bulk operation
  3. Search Azure MonitorActivity for LISTACCOUNTSAS or LISTKEYS operations on properties.accountName in the 48 hours before the alert to identify credential theft that may have authorized the bulk writes
Reference: https://learn.microsoft.com/en-us/azure/storage/blobs/encryption-customer-provided-keys
Tags:
  - Azure
  - Impact
  - Ransomware
Reports:
  MITRE ATT&CK:
    - TA0040:T1486 # Impact: Data Encrypted for Impact
Tests:
  - Name: Match - Successful PutBlob
    ExpectedResult: true
    Log:
      {
        "time": "2024-12-19T19:14:59.091Z",
        "resourceId": "/subscriptions/12345678-1234-1234-1234-123456789abc/resourceGroups/myresourcegroup/providers/Microsoft.Storage/storageAccounts/mystorageaccount/blobServices/default",
        "category": "StorageWrite",
        "operationName": "PutBlob",
        "operationVersion": "2025-11-05",
        "statusCode": 201,
        "statusText": "Success",
        "callerIpAddress": "5.5.5.5:29713",
        "location": "eastus",
        "properties": {
          "accountName": "mystorageaccount",
          "userAgentHeader": "azsdk-python-storage-blob/12.27.1 Python/3.12.9",
          "serviceType": "blob",
          "objectKey": "/mystorageaccount/documents/report.pdf.ENCRYPTED",
          "metricResponseType": "Success",
          "serverLatencyMs": 11,
          "tlsVersion": "TLS 1.3"
        },
        "tenantId": "87654321-4321-4321-4321-111111111111"
      }
  - Name: Match - Case Insensitive Operation Name
    ExpectedResult: true
    Log:
      {
        "time": "2024-12-19T19:15:01.000Z",
        "resourceId": "/subscriptions/12345678-1234-1234-1234-123456789abc/resourceGroups/myresourcegroup/providers/Microsoft.Storage/storageAccounts/mystorageaccount/blobServices/default",
        "operationName": "putblob",
        "statusCode": 201,
        "callerIpAddress": "5.5.5.5:29713",
        "location": "eastus",
        "properties": {
          "accountName": "mystorageaccount",
          "objectKey": "/mystorageaccount/documents/budget.xlsx.ENCRYPTED",
          "metricResponseType": "Success"
        },
        "tenantId": "87654321-4321-4321-4321-111111111111"
      }
  - Name: No Match - Different Operation
    ExpectedResult: false
    Log:
      {
        "time": "2024-12-19T16:37:59.255Z",
        "resourceId": "/subscriptions/12345678-1234-1234-1234-123456789abc/resourceGroups/myresourcegroup/providers/Microsoft.Storage/storageAccounts/mystorageaccount/blobServices/default",
        "operationName": "GetBlob",
        "callerIpAddress": "5.5.5.5:29713",
        "location": "eastus",
        "properties": {
          "accountName": "mystorageaccount",
          "objectKey": "/mystorageaccount/documents/report.pdf",
          "metricResponseType": "Success"
        },
        "tenantId": "87654321-4321-4321-4321-111111111111"
      }
  - Name: No Match - Failed Upload
    ExpectedResult: false
    Log:
      {
        "time": "2024-12-19T19:16:00.000Z",
        "resourceId": "/subscriptions/12345678-1234-1234-1234-123456789abc/resourceGroups/myresourcegroup/providers/Microsoft.Storage/storageAccounts/mystorageaccount/blobServices/default",
        "operationName": "PutBlob",
        "statusCode": 403,
        "statusText": "AuthorizationFailure",
        "callerIpAddress": "5.5.5.5:29713",
        "location": "eastus",
        "properties": {
          "accountName": "mystorageaccount",
          "objectKey": "/mystorageaccount/documents/restricted.pdf",
          "metricResponseType": "ClientOtherError"
        },
        "tenantId": "87654321-4321-4321-4321-111111111111"
      }
  - Name: No Match - DeleteBlob Operation
    ExpectedResult: false
    Log:
      {
        "time": "2024-12-19T19:17:00.000Z",
        "resourceId": "/subscriptions/12345678-1234-1234-1234-123456789abc/resourceGroups/myresourcegroup/providers/Microsoft.Storage/storageAccounts/mystorageaccount/blobServices/default",
        "operationName": "DeleteBlob",
        "statusCode": 202,
        "callerIpAddress": "5.5.5.5:29713",
        "location": "eastus",
        "properties": {
          "accountName": "mystorageaccount",
          "objectKey": "/mystorageaccount/documents/old_file.pdf",
          "metricResponseType": "Success"
        },
        "tenantId": "87654321-4321-4321-4321-111111111111"
      }
