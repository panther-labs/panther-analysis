AnalysisType: rule
Filename: okta_service_app_dangerous_scope_token_grant.py
RuleID: "Okta.ServiceApp.DangerousScope.TokenGrant"
DisplayName: "Okta Service App Acquired Dangerous Management Scope Token"
Enabled: true
Status: Experimental
LogTypes:
  - Okta.SystemLog
Tags:
  - Okta
  - OAuth2
  - Credential Access
  - Defense Evasion
  - Privilege Escalation:Valid Accounts
Reports:
  MITRE ATT&CK:
    - TA0006:T1550.001
    - TA0003:T1098
    - TA0005:T1556.006
Severity: Medium
Description: >
  An Okta service application obtained an OAuth2 access token via the client_credentials grant type
  with one or more dangerous management scopes (okta.users.manage, okta.factors.manage, okta.apps.manage,
  okta.groups.manage, okta.policies.manage). Pre-exploitation signal — fires at capability acquisition
  before the scopes are used. client_credentials grants have no user subject, so management scopes
  granted to a service app are effectively org-wide administrative access.
Reference: https://developer.okta.com/docs/guides/implement-oauth-for-okta-serviceapp/main/
Runbook: |
  1. Pull the service app (actor.displayName, actor.id), granted scopes (debug_context.debugData.grantedScopes), client auth method (debug_context.debugData.clientAuthType), and source IP from alert_context
  2. Query Okta system logs in the 4 hours before the alert for app.oauth2.admin.consent.grant, application.lifecycle.create, and FAILURE app.oauth2.token.grant events involving the same actor.id or source IP — identify which admin granted the dangerous scope and whether the attacker iterated through failed attempts before success
  3. Query Okta system logs from p_event_time up to NOW (capped at 2 hours) filtered on actor.id for user.mfa.factor.deactivate, user.account.update_profile, system.api_token.create, or application.user_membership.add events — attackers exercise the token within minutes of acquisition; if the available window is under 30 minutes and zero rows are returned, flag as pending and schedule a follow-up rather than concluding no abuse
DedupPeriodMinutes: 60
SummaryAttributes:
  - eventType
  - p_any_ip_addresses
  - p_any_actor_ids
Tests:
  - Name: client_credentials grant with okta.users.manage (HIGH severity)
    ExpectedResult: true
    Log:
      {
        "published": "2026-05-20 10:15:00.000",
        "eventType": "app.oauth2.token.grant.access_token",
        "version": "0",
        "severity": "INFO",
        "actor":
          {
            "alternateId": "acme-service-app",
            "displayName": "Acme Service App",
            "id": "0oaservice12345",
            "type": "PublicClientAppEntity",
          },
        "client":
          {
            "ipAddress": "1.2.3.4",
            "userAgent": { "rawUserAgent": "python-requests/2.31.0" },
          },
        "outcome": { "result": "SUCCESS" },
        "debugcontext":
          {
            "debugData":
              {
                "grantType": "client_credentials",
                "grantedScopes": "okta.users.manage, okta.factors.manage",
                "requestedScopes": "okta.users.manage, okta.factors.manage",
                "clientAuthType": "private_key_jwt",
              },
          },
        "p_log_type": "Okta.SystemLog",
      }
  - Name: client_credentials grant with okta.apps.manage only (MEDIUM severity)
    ExpectedResult: true
    Log:
      {
        "published": "2026-05-20 10:15:00.000",
        "eventType": "app.oauth2.token.grant.access_token",
        "actor":
          {
            "displayName": "Acme Service App",
            "id": "0oaservice12345",
            "type": "PublicClientAppEntity",
          },
        "client": { "ipAddress": "1.2.3.4" },
        "outcome": { "result": "SUCCESS" },
        "debugcontext":
          {
            "debugData":
              {
                "grantType": "client_credentials",
                "grantedScopes": "okta.apps.manage",
                "clientAuthType": "client_secret_post",
              },
          },
        "p_log_type": "Okta.SystemLog",
      }
  - Name: authorization_code grant (should not fire)
    ExpectedResult: false
    Log:
      {
        "eventType": "app.oauth2.token.grant.access_token",
        "outcome": { "result": "SUCCESS" },
        "debugcontext":
          {
            "debugData":
              {
                "grantType": "authorization_code",
                "grantedScopes": "openid, profile, email",
              },
          },
        "p_log_type": "Okta.SystemLog",
      }
  - Name: client_credentials with only benign scopes (should not fire)
    ExpectedResult: false
    Log:
      {
        "eventType": "app.oauth2.token.grant.access_token",
        "outcome": { "result": "SUCCESS" },
        "debugcontext":
          {
            "debugData":
              {
                "grantType": "client_credentials",
                "grantedScopes": "openid, profile, email",
              },
          },
        "p_log_type": "Okta.SystemLog",
      }
  - Name: client_credentials with only .self-suffixed scope (regression for substring false positive)
    ExpectedResult: false
    Log:
      {
        "eventType": "app.oauth2.token.grant.access_token",
        "actor":
          {
            "displayName": "Acme Service App",
            "id": "0oaservice12345",
            "type": "PublicClientAppEntity",
          },
        "outcome": { "result": "SUCCESS" },
        "debugcontext":
          {
            "debugData":
              {
                "grantType": "client_credentials",
                "grantedScopes": "openid, profile, okta.users.manage.self",
              },
          },
        "p_log_type": "Okta.SystemLog",
      }
  - Name: client_credentials grant but actor is User, not service app (should not fire)
    ExpectedResult: false
    Log:
      {
        "eventType": "app.oauth2.token.grant.access_token",
        "actor":
          {
            "alternateId": "homer@springfield.gov",
            "displayName": "Homer Simpson",
            "id": "00uvictim123",
            "type": "User",
          },
        "outcome": { "result": "SUCCESS" },
        "debugcontext":
          {
            "debugData":
              {
                "grantType": "client_credentials",
                "grantedScopes": "okta.users.manage",
              },
          },
        "p_log_type": "Okta.SystemLog",
      }
  - Name: Service app actor but target contains a User (should not fire)
    ExpectedResult: false
    Log:
      {
        "eventType": "app.oauth2.token.grant.access_token",
        "actor":
          {
            "displayName": "Acme Service App",
            "id": "0oaservice12345",
            "type": "PublicClientAppEntity",
          },
        "outcome": { "result": "SUCCESS" },
        "target":
          [
            {
              "alternateId": "homer@springfield.gov",
              "displayName": "Homer Simpson",
              "id": "00uvictim123",
              "type": "User",
            },
          ],
        "debugcontext":
          {
            "debugData":
              {
                "grantType": "client_credentials",
                "grantedScopes": "okta.users.manage",
              },
          },
        "p_log_type": "Okta.SystemLog",
      }
