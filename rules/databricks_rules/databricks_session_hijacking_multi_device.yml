AnalysisType: scheduled_rule
Filename: databricks_session_hijacking_multi_device.py
RuleID: "Databricks.Audit.SessionHijackingMultiDevice"
DisplayName: "Databricks Session Hijacking - Multi Device"
Enabled: true
ScheduledQueries:
  - Query.Databricks.SessionHijackingMultiDevice
Severity: High
Status: Experimental
Tags:
  - Databricks
  - Credential Access
  - Session Hijacking
Reports:
  MITRE ATT&CK:
    - TA0006:T1539 # Steal Web Session Cookie
Description: |
  Detects the same Databricks session ID being used from a different IP address and a
  different device (user agent) within 24 hours. This is a strong indicator of session
  token theft, where an attacker replays a stolen session cookie from their own infrastructure.

  Detection logic:
  - Per-session: flags sessions with 2+ distinct public IPs AND 2+ distinct user agents
  - Excludes private IPs and known Databricks service agents
  - Baseline-aware: includes user's historical IP/agent diversity for triage context

  Requires: databricks_user_session_baseline_30d lookup table.
Runbook: |
  1. Retrieve the full session history from audit logs using the session_id
  2. Compare ip_list and agent_list to identify the original vs suspicious device
  3. Check if the new IP belongs to a known hosting provider or VPN
  4. If confirmed, immediately revoke the session and force password reset
Reference: https://github.com/databricks-solutions/cybersec-workspace-detection-app/tree/main/base/detections/behavioral
DedupPeriodMinutes: 1440
SummaryAttributes:
  - user_email
  - session_id
  - anomaly_severity_score
Tests:
  - Name: Session Used From Two IPs and Two Devices
    ExpectedResult: true
    Log:
      {
        "user_email": "user@example.com",
        "session_id": "abc123def456",
        "total_events": 4,
        "unique_ips": 2,
        "unique_agents": 2,
        "ip_list": ["203.0.113.50", "198.51.100.22"],
        "agent_list": [
          "Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7) Chrome/120.0",
          "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Firefox/121.0"
        ],
        "first_event": "2024-01-01 10:00:00",
        "last_event": "2024-01-01 14:00:00",
        "baseline_mean_ips_per_day": 1.0,
        "baseline_active_days": 20,
        "baseline_ip_diversity": 2,
        "baseline_agent_diversity": 1,
        "is_cold_start": false,
        "is_anomalous": true,
        "anomaly_severity_score": 40.0
      }

  - Name: Cold Start User - Session From Multiple Devices
    ExpectedResult: true
    Log:
      {
        "user_email": "newuser@example.com",
        "session_id": "new-session-789",
        "total_events": 3,
        "unique_ips": 2,
        "unique_agents": 2,
        "ip_list": ["203.0.113.10", "198.51.100.50"],
        "agent_list": ["Chrome/120.0", "curl/8.0"],
        "first_event": "2024-01-01 09:00:00",
        "last_event": "2024-01-01 11:00:00",
        "baseline_mean_ips_per_day": 0,
        "baseline_active_days": 0,
        "baseline_ip_diversity": 0,
        "baseline_agent_diversity": 0,
        "is_cold_start": true,
        "is_anomalous": true,
        "anomaly_severity_score": 40.0
      }

  - Name: Malformed Row - Missing User Email
    ExpectedResult: false
    Log:
      {
        "session_id": "abc123def456",
        "unique_ips": 2,
        "unique_agents": 2,
        "is_anomalous": true,
        "anomaly_severity_score": 40.0
      }

  - Name: Malformed Row - Empty User Email
    ExpectedResult: false
    Log:
      {
        "user_email": "",
        "session_id": "abc123def456",
        "unique_ips": 2,
        "unique_agents": 2,
        "is_anomalous": true,
        "anomaly_severity_score": 40.0
      }
