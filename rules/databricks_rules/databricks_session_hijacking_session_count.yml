AnalysisType: scheduled_rule
Filename: databricks_session_hijacking_session_count.py
RuleID: "Databricks.Audit.SessionHijackingSessionCount"
DisplayName: "Databricks Session Hijacking - Session Count"
Enabled: true
ScheduledQueries:
  - Query.Databricks.SessionHijackingSessionCount
Severity: High
Status: Experimental
Tags:
  - Databricks
  - Credential Access
  - Session Hijacking
Reports:
  MITRE ATT&CK:
    - TA0006:T1539 # Steal Web Session Cookie
Description: |
  Detects a single Databricks session ID being used from 3 or more distinct public IP
  addresses within a 24-hour period. While a user might occasionally switch networks,
  a session appearing from many distinct IPs strongly suggests token theft or session replay.

  Detection logic:
  - Per-session: flags sessions with 3+ distinct public IPs in 24 hours
  - Z-score: unique IP count per session > 2σ above user's baseline mean
  - Cold-start: alerts on any session with 3+ IPs for users with no prior baseline

  Requires: databricks_user_session_baseline_30d lookup table.
Runbook: |
  1. Query audit logs for all events with this session_id in the past 48 hours
  2. Map all distinct IPs and user agents from ip_list and agent_list
  3. Check if the IPs belong to known hosting providers, VPNs, or Tor exit nodes
  4. Compare z_score_session_ips against baseline to assess confidence
  5. If confirmed, revoke the session and force re-authentication
Reference: https://github.com/databricks-solutions/cybersec-workspace-detection-app/tree/main/base/detections/behavioral
DedupPeriodMinutes: 1440
SummaryAttributes:
  - user_email
  - session_id
  - anomaly_severity_score
Tests:
  # Note: rule() only validates user_email; IP thresholds are enforced at the query level.

  - Name: Session From 3 IPs - Cold Start
    ExpectedResult: true
    Log:
      {
        "user_email": "user@example.com",
        "session_id": "session-abc-123",
        "total_events": 5,
        "unique_ips": 3,
        "unique_agents": 1,
        "ip_list": ["203.0.113.50", "198.51.100.22", "192.0.2.100"],
        "agent_list": ["Chrome/120.0"],
        "first_event": "2024-01-01 08:00:00",
        "last_event": "2024-01-01 20:00:00",
        "baseline_mean_ips_per_day": 0,
        "baseline_stddev_ips_per_day": 0,
        "baseline_active_days": 0,
        "baseline_ip_diversity": 0,
        "z_score_session_ips": null,
        "is_cold_start": true,
        "is_anomalous": true,
        "anomaly_severity_score": 30.0
      }

  - Name: Session From 5 IPs - Z-Score Anomaly
    ExpectedResult: true
    Log:
      {
        "user_email": "admin@example.com",
        "session_id": "session-xyz-789",
        "total_events": 10,
        "unique_ips": 5,
        "unique_agents": 2,
        "ip_list": ["203.0.113.1", "203.0.113.2", "198.51.100.1", "192.0.2.1", "192.0.2.2"],
        "agent_list": ["Chrome/120.0", "Firefox/121.0"],
        "first_event": "2024-01-01 06:00:00",
        "last_event": "2024-01-01 22:00:00",
        "baseline_mean_ips_per_day": 1.5,
        "baseline_stddev_ips_per_day": 0.5,
        "baseline_active_days": 30,
        "baseline_ip_diversity": 3,
        "z_score_session_ips": 7.0,
        "is_cold_start": false,
        "is_anomalous": true,
        "anomaly_severity_score": 50.0
      }

  - Name: Malformed Row - Missing User Email
    ExpectedResult: false
    Log:
      {
        "session_id": "session-abc-123",
        "unique_ips": 3,
        "is_anomalous": true,
        "anomaly_severity_score": 30.0
      }

  - Name: Malformed Row - Empty User Email
    ExpectedResult: false
    Log:
      {
        "user_email": "",
        "session_id": "session-abc-123",
        "unique_ips": 3,
        "is_anomalous": true,
        "anomaly_severity_score": 30.0
      }
