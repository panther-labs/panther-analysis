AnalysisType: scheduled_rule
Filename: databricks_spike_in_table_admin_activity.py
RuleID: "Databricks.Audit.SpikeInTableAdminActivity"
DisplayName: "Databricks Spike in Table Admin Activity"
Enabled: true
ScheduledQueries:
  - Query.Databricks.SpikeInTableAdminActivity
Severity: Medium
Status: Experimental
Tags:
  - Databricks
  - Privilege Escalation
  - Anomaly Detection
Reports:
  MITRE ATT&CK:
    - TA0004:T1078 # Privilege Escalation - Valid Accounts
    - TA0003:T1098 # Persistence - Account Manipulation
Description: |
  Detects abnormal spikes in admin-level query activity per user using behavioral
  z-score analysis against a 30-day baseline. Admin queries include DDL/DCL commands
  (ALTER, DROP, GRANT, REVOKE, CREATE, UPDATE) on tables, schemas, catalogs, and
  Unity Catalog objects.

  Detection logic:
  - Z-score: daily admin query count > 2σ above user's baseline mean
  - Volume spike: daily count > 1.5x baseline mean (for low-variance users)
  - Historical max: daily count > 2x the user's all-time max
  - Cold-start: first-time admin activity with > 5 queries (no prior baseline)

  Requires: databricks_user_query_baseline_30d lookup table.
Runbook: |
  1. Review action_list in alert context to identify what admin commands were run
  2. Check if the user normally performs admin queries (baseline_active_days, baseline_mean_per_day)
  3. Investigate whether the queries align with a known change window or deployment
  4. If cold-start, verify the user has legitimate admin access
  5. Cross-reference with privilege escalation or group membership change alerts
Reference: https://github.com/databricks-solutions/cybersec-workspace-detection-app/tree/main/base/detections/behavioral
DedupPeriodMinutes: 1440
SummaryAttributes:
  - user_email
  - anomaly_severity_score
Tests:
  # Note: rule() only validates user_email; anomaly thresholds are enforced at the query level.

  - Name: Z-Score Anomaly - Known User with Spike
    ExpectedResult: true
    Log:
      {
        "user_email": "admin@example.com",
        "recent_admin_queries": 45,
        "recent_unique_actions": 5,
        "recent_unique_workspaces": 2,
        "action_list": ["updateTable", "deleteTable", "grant", "updateSchema", "changeOwner"],
        "first_event": "2024-01-01 08:00:00",
        "last_event": "2024-01-01 17:00:00",
        "baseline_active_days": 25,
        "baseline_total_admin_queries": 150,
        "baseline_mean_per_day": 6.0,
        "baseline_stddev_per_day": 3.0,
        "baseline_max_per_day": 15,
        "z_score_admin_queries": 13.0,
        "ratio_vs_baseline": 7.5,
        "is_cold_start": false,
        "is_anomalous": true,
        "anomaly_severity_score": 65.0
      }

  - Name: Cold Start - First-Time Admin with High Volume
    ExpectedResult: true
    Log:
      {
        "user_email": "newuser@example.com",
        "recent_admin_queries": 12,
        "recent_unique_actions": 3,
        "recent_unique_workspaces": 1,
        "action_list": ["grant", "updatePermissions", "updateTable"],
        "first_event": "2024-01-01 14:00:00",
        "last_event": "2024-01-01 15:30:00",
        "baseline_active_days": 0,
        "baseline_total_admin_queries": 0,
        "baseline_mean_per_day": 0,
        "baseline_stddev_per_day": 0,
        "baseline_max_per_day": 0,
        "z_score_admin_queries": null,
        "ratio_vs_baseline": null,
        "is_cold_start": true,
        "is_anomalous": true,
        "anomaly_severity_score": 18.0
      }

  - Name: Malformed Row - Missing User Email
    ExpectedResult: false
    Log:
      {
        "recent_admin_queries": 45,
        "is_anomalous": true,
        "anomaly_severity_score": 65.0
      }

  - Name: Malformed Row - Empty User Email
    ExpectedResult: false
    Log:
      {
        "user_email": "",
        "recent_admin_queries": 45,
        "is_anomalous": true,
        "anomaly_severity_score": 65.0
      }
