AnalysisType: scheduled_rule
Filename: databricks_token_scanning_activity.py
RuleID: "Databricks.Audit.TokenScanningActivity"
DisplayName: "Databricks Token Scanning Activity"
Enabled: true
ScheduledQueries:
  - Query.Databricks.TokenScanningActivity
Severity: Medium
Status: Experimental
Tags:
  - Databricks
  - Credential Access
  - Token Scanning
  - Anomaly Detection
Reports:
  MITRE ATT&CK:
    - TA0006:T1110 # Brute Force
    - TA0006:T1528 # Steal Application Access Token
Description: |
  Detects anomalously low activity from API tokens across multiple public IPs, indicating
  brute-force token probing or scanning. Attackers probe stolen or guessed tokens with
  single requests from many IPs to avoid rate limiting and detection.

  Detection logic:
  - Per-token: finds tokens with 3+ distinct public IPs AND < 2 events per IP on average
  - Failure rate: weights severity by the proportion of 401/403 responses
  - Baseline: compares IP diversity against user's normal patterns

  Requires: databricks_user_session_baseline_30d lookup table.
Runbook: |
  1. Check token_id and whether it's a legitimate token for the user
  2. Review ip_list for hosting providers, VPNs, or Tor exit nodes
  3. Check failure_rate_pct - high failure rate strongly indicates scanning
  4. If the token is valid, revoke it immediately and issue a new one
  5. Investigate whether other tokens for the same user are also being probed
Reference: https://github.com/databricks-solutions/cybersec-workspace-detection-app/tree/main/base/detections/behavioral
DedupPeriodMinutes: 1440
SummaryAttributes:
  - user_email
  - token_id
  - anomaly_severity_score
Tests:
  # Note: rule() only validates user_email; scanning pattern is enforced at the query level.

  - Name: Token Scanned From Many IPs with High Failure Rate
    ExpectedResult: true
    Log:
      {
        "user_email": "user@example.com",
        "token_id": "dapi-abc123def456",
        "total_events": 5,
        "unique_ips": 5,
        "unique_agents": 3,
        "events_per_ip": 1.0,
        "failed_events": 4,
        "failure_rate_pct": 80.0,
        "ip_list": ["203.0.113.1", "203.0.113.2", "198.51.100.1", "192.0.2.1", "192.0.2.2"],
        "first_event": "2024-01-01 03:00:00",
        "last_event": "2024-01-01 04:00:00",
        "baseline_mean_ips_per_day": 1.0,
        "baseline_stddev_ips_per_day": 0.5,
        "baseline_active_days": 20,
        "baseline_ip_diversity": 2,
        "z_score_token_ips": 8.0,
        "is_cold_start": false,
        "is_anomalous": true,
        "anomaly_severity_score": 36.0
      }

  - Name: Token Probed From 3 IPs - Low Events Per IP
    ExpectedResult: true
    Log:
      {
        "user_email": "svc-account@example.com",
        "token_id": "dapi-xyz789",
        "total_events": 3,
        "unique_ips": 3,
        "unique_agents": 1,
        "events_per_ip": 1.0,
        "failed_events": 1,
        "failure_rate_pct": 33.3,
        "ip_list": ["203.0.113.10", "198.51.100.50", "192.0.2.100"],
        "first_event": "2024-01-01 12:00:00",
        "last_event": "2024-01-01 12:30:00",
        "baseline_mean_ips_per_day": 0,
        "baseline_stddev_ips_per_day": 0,
        "baseline_active_days": 0,
        "baseline_ip_diversity": 0,
        "z_score_token_ips": null,
        "is_cold_start": true,
        "is_anomalous": true,
        "anomaly_severity_score": 3.99
      }

  - Name: Malformed Row - Missing User Email
    ExpectedResult: false
    Log:
      {
        "token_id": "dapi-abc123",
        "unique_ips": 5,
        "is_anomalous": true,
        "anomaly_severity_score": 36.0
      }

  - Name: Malformed Row - Empty User Email
    ExpectedResult: false
    Log:
      {
        "user_email": "",
        "token_id": "dapi-abc123",
        "unique_ips": 5,
        "is_anomalous": true,
        "anomaly_severity_score": 36.0
      }
