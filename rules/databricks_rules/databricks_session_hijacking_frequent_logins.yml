AnalysisType: scheduled_rule
Filename: databricks_session_hijacking_frequent_logins.py
RuleID: "Databricks.Audit.SessionHijackingFrequentLogins"
DisplayName: "Databricks Session Hijacking - Frequent Logins"
Enabled: true
ScheduledQueries:
  - Query.Databricks.SessionHijackingFrequentLogins
Severity: Medium
Status: Experimental
Tags:
  - Databricks
  - Credential Access
  - Session Hijacking
Reports:
  MITRE ATT&CK:
    - TA0006:T1539 # Steal Web Session Cookie
    - TA0001:T1078 # Valid Accounts
Description: |
  Detects rapid login events from different public IPs and user agents within a one-hour
  window for the same user. This pattern may indicate session token theft, credential
  compromise, or automated replay of stolen credentials. Uses behavioral baselining to
  suppress alerts for users who normally log in from many IPs.

  Requires: databricks_user_session_baseline_30d lookup table.
Runbook: |
  1. Review ip_list and agent_list in alert context to identify which devices/networks were used
  2. Check if the new IPs belong to known VPN, proxy, or hosting providers
  3. Compare against baseline_mean_ips_per_day - if the user normally has high IP diversity, this may be benign
  4. If confirmed suspicious, revoke active sessions and rotate credentials
Reference: https://github.com/databricks-solutions/cybersec-workspace-detection-app/tree/main/base/detections/behavioral
DedupPeriodMinutes: 60
SummaryAttributes:
  - user_email
  - anomaly_severity_score
Tests:
  - Name: Multi-IP Multi-Device Burst - Cold Start
    ExpectedResult: true
    Log:
      {
        "user_email": "user@example.com",
        "event_hour": "2024-01-01 14:00:00",
        "hourly_logins": 8,
        "hourly_unique_ips": 4,
        "hourly_unique_agents": 3,
        "ip_list": ["203.0.113.50", "198.51.100.22", "192.0.2.100", "192.0.2.200"],
        "agent_list": ["Chrome/120.0", "Firefox/121.0", "Safari/17.0"],
        "first_event": "2024-01-01 14:01:00",
        "last_event": "2024-01-01 14:55:00",
        "baseline_mean_ips_per_day": 0,
        "baseline_stddev_ips_per_day": 0,
        "baseline_active_days": 0,
        "baseline_ip_diversity": 0,
        "z_score_unique_ips": null,
        "is_cold_start": true,
        "is_anomalous": true,
        "anomaly_severity_score": 12.0
      }

  - Name: Z-Score Anomaly - Known User with Spike
    ExpectedResult: true
    Log:
      {
        "user_email": "admin@example.com",
        "event_hour": "2024-01-01 10:00:00",
        "hourly_logins": 12,
        "hourly_unique_ips": 5,
        "hourly_unique_agents": 3,
        "ip_list": ["203.0.113.1", "203.0.113.2", "203.0.113.3", "198.51.100.1", "192.0.2.1"],
        "agent_list": ["Chrome/120.0", "Firefox/121.0", "curl/8.0"],
        "first_event": "2024-01-01 10:02:00",
        "last_event": "2024-01-01 10:58:00",
        "baseline_mean_ips_per_day": 1.5,
        "baseline_stddev_ips_per_day": 0.5,
        "baseline_active_days": 25,
        "baseline_ip_diversity": 3,
        "z_score_unique_ips": 7.0,
        "is_cold_start": false,
        "is_anomalous": true,
        "anomaly_severity_score": 21.0
      }

  - Name: Malformed Row - Missing User Email
    ExpectedResult: false
    Log:
      {
        "hourly_unique_ips": 5,
        "hourly_unique_agents": 3,
        "is_anomalous": true,
        "anomaly_severity_score": 15.0
      }

  - Name: Malformed Row - Empty User Email
    ExpectedResult: false
    Log:
      {
        "user_email": "",
        "hourly_unique_ips": 5,
        "is_anomalous": true,
        "anomaly_severity_score": 15.0
      }
