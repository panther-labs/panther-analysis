AnalysisType: rule
RuleID: AWS.EC2.Instance.Launch.NoTags
DisplayName: EC2 Instance Launched Without Required Tags
Enabled: true
Filename: aws_ec2_instance_without_tags.py
LogTypes:
  - AWS.CloudTrail
Severity: High
Description: >
  Detects when an EC2 instance is launched without the required tags 'team_owner' or 'deployment_segment'.
  This may indicate a server spun up outside of normal processes, potentially for malicious purposes.
Tags:
  - aws.ec2
  - resource.create
  - compliance.soc2
  - discovery.T1535_cloud_services
  - policy.change
  - defense_evasion.T1098_account_manipulation
OutputIds:
  - "d4735112-507e-43a9-96a0-8c850e722c3b"
InlineFilters:
  - KeyPath: eventSource
    Condition: Equals
    Value: ec2.amazonaws.com
  - KeyPath: eventName
    Condition: Equals
    Value: RunInstances
Tests:
  - Name: No tags present
    ExpectedResult: true
    Log:
      eventSource: ec2.amazonaws.com
      eventName: RunInstances
      requestParameters:
        tagSpecification: []
  - Name: Missing required tags
    ExpectedResult: true
    Log:
      eventSource: ec2.amazonaws.com
      eventName: RunInstances
      requestParameters:
        tagSpecification:
          - tags:
              - key: Name
                value: test-instance
  - Name: Both required tags present
    ExpectedResult: false
    Log:
      eventSource: ec2.amazonaws.com
      eventName: RunInstances
      requestParameters:
        tagSpecification:
          - tags:
              - key: team_owner
                value: security
              - key: deployment_segment
                value: prod 