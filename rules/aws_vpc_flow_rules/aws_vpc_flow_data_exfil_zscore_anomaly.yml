AnalysisType: scheduled_rule
Filename: aws_vpc_flow_data_exfil_zscore_anomaly.py
RuleID: "AWS.VPCFlow.DataExfiltration.ZScore"
DisplayName: "VPC Flow Log Data Exfiltration Anomaly - Z-Score Detection"
Enabled: false  # Start disabled for tuning
ScheduledQueries:
  - Query.AWS.VPCFlow.DataExfilZScoreAnomaly
Severity: Medium  # Default; dynamic severity in rule function
Status: Experimental
Tags:
  - AWS
  - VPC
  - Data Exfiltration
  - Anomaly Detection
  - Statistical Analysis
  - Exfiltration:Exfiltration Over Web Service
  - Exfiltration:Transfer Data to Cloud Account
Reports:
  MITRE ATT&CK:
    - TA0010:T1567  # Exfiltration Over Web Service
    - TA0010:T1048  # Exfiltration Over Alternative Protocol
    - TA0010:T1041  # Exfiltration Over C2 Channel
Description: |
  Detects potential data exfiltration via anomalous outbound VPC flow log traffic using z-score
  statistical analysis.

  This detection uses a lookup table containing 90-day behavioral baselines for each AWS account's
  outbound traffic patterns, then calculates z-scores to identify suspicious activity in the last
  7 days.

  **PREREQUISITES:**
  1. Baseline builder lookup table must be configured: `vpc_flow_data_exfil_baseline_90d`
  2. VPC flow logs v5+ required for the flowDirection field
  3. Allow 24 hours for initial baseline to populate

  **Detection Logic:**
  Baselines hourly outbound bytes, flow count, destination IP diversity, destination port
  diversity, and source IP diversity per AWS account. Alerts when recent activity shows BOTH:
  1. Byte volume spike (z-score > 3 standard deviations above baseline)
  2. At least one diversity spike (z-score > 2): destination IP, destination port, or source IP

  **Why This Matters:**
  Data exfiltration has a distinct signature: large volumes sent to many new/unusual destinations,
  or suddenly initiated from many internal hosts simultaneously. Volume alone (e.g., a legitimate
  scheduled backup) is less suspicious; the combination of volume AND diversity anomalies is a
  high-fidelity exfil indicator that filters out routine high-bandwidth activity.

  **Complementary Detections:**
  - `AWS.VPCFlow.UnapprovedOutboundDNS` detects DNS tunneling as an exfil channel
  - CloudTrail S3 bulk download rules for object-level exfil patterns

Reference: https://attack.mitre.org/techniques/T1048/
Runbook: |
  1. Review z_score_bytes and recent_max_bytes_per_hour against baseline_mean_bytes_per_hour for account_id to confirm the volume spike — verify baseline_updated_at is within the past 7 days to ensure the baseline reflects current normal behavior
  2. Examine all_recent_dst_ips in the 7 days around first_anomaly_hour — check whether destination IPs resolve to known cloud storage, file-sharing, or paste services and compare against primary_dst_ip from the baseline to identify new external destinations
  3. Query VPC flow logs and CloudTrail for account_id in the 24 hours before first_anomaly_hour to identify which internal source IPs (reflected in recent_max_src_ip_diversity) initiated the transfers, and look for new IAM role assumptions, EC2 launches, or S3 bucket policy changes that could indicate compromised infrastructure
DedupPeriodMinutes: 360  # 6 hours, match query frequency
SummaryAttributes:
  - account_id
  - anomaly_severity_score
  - z_score_bytes
  - z_score_dst_ip_diversity
