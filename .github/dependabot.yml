version: 2
updates:
  - package-ecosystem: "github-actions" # See documentation for possible values
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
  - package-ecosystem: "pip" # covers Pipfile and Pipfile.lock (incl. transitive deps)
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
