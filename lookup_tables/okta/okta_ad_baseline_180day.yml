AnalysisType: lookup_table
LookupName: okta_ad_pantherflow_baseline_180d
Enabled: false
Refresh:
  PeriodMinutes: 1440
Description: >
  Builds a 180-day behavioral baseline for Okta AD agent authentication events per user.
  Computes scalar features and hourly statistics (event volume, IP/country/city/device diversity)
  over a 180-day window (excluding the last 7 days) to support z-score anomaly detection.
Query: |
  WITH base AS (
      SELECT
          actor:alternateId::string AS user_email,
          published,
          client:geographicalContext:country::string AS country,
          client:geographicalContext:city::string AS city,
          client:ipAddress::string AS ip_address,
          securityContext:asNumber::string AS asn,
          debugContext:debugData:deviceFingerprint::string AS device_fingerprint,
          DATE(published) AS event_date,
          DATE_TRUNC('hour', published) AS event_hour
      FROM panther_logs.public.okta_systemlog
      WHERE p_event_time >= CURRENT_DATE - INTERVAL '187 days'
          AND p_event_time < CURRENT_TIMESTAMP - INTERVAL '7 days'
          AND actor:alternateId::string LIKE '%@%'
          AND eventType = 'user.authentication.auth_via_AD_agent'
          AND outcome:result = 'SUCCESS'
  ),

  scalar_features AS (
      SELECT
          user_email,
          COUNT(*) AS total_ad_agent_events,
          COUNT(DISTINCT country) AS country_diversity,
          COUNT(DISTINCT city) AS city_diversity,
          COUNT(DISTINCT ip_address) AS ip_diversity,
          COUNT(DISTINCT device_fingerprint) AS device_fingerprint_diversity,
          COUNT(DISTINCT asn) AS asn_diversity,
          COUNT(DISTINCT event_date) AS active_days_count,
          MODE(country) AS primary_country,
          MODE(city) AS primary_city,
          MODE(ip_address) AS primary_ip
      FROM base
      GROUP BY user_email
  ),

  ad_agent_hourly AS (
      SELECT
          user_email,
          event_hour,
          COUNT(*) AS hourly_total_events,
          COUNT(DISTINCT ip_address) AS hourly_ip_diversity,
          COUNT(DISTINCT country) AS hourly_country_diversity,
          COUNT(DISTINCT city) AS hourly_city_diversity,
          COUNT(DISTINCT asn) AS hourly_asn_diversity,
          COUNT(DISTINCT device_fingerprint) AS hourly_device_diversity
      FROM base
      GROUP BY user_email, event_hour
  ),

  ad_agent_stats AS (
      SELECT
          user_email,
          SUM(hourly_total_events) AS total_events,
          COUNT(DISTINCT DATE(event_hour)) AS active_days,
          AVG(hourly_total_events)::FLOAT AS mean_events_per_hour,
          STDDEV(hourly_total_events) AS stddev_events_per_hour,
          AVG(hourly_ip_diversity)::FLOAT AS mean_ip_diversity_per_hour,
          STDDEV(hourly_ip_diversity) AS stddev_ip_diversity_per_hour,
          AVG(hourly_country_diversity)::FLOAT AS mean_country_diversity_per_hour,
          STDDEV(hourly_country_diversity) AS stddev_country_diversity_per_hour,
          AVG(hourly_city_diversity)::FLOAT AS mean_city_diversity_per_hour,
          STDDEV(hourly_city_diversity) AS stddev_city_diversity_per_hour,
          AVG(hourly_device_diversity)::FLOAT AS mean_device_diversity_per_hour,
          STDDEV(hourly_device_diversity) AS stddev_device_diversity_per_hour,
          COUNT(*) AS hours_with_activity,
          MIN(event_hour) AS first_event,
          MAX(event_hour) AS last_event
      FROM ad_agent_hourly
      GROUP BY user_email
      HAVING SUM(hourly_total_events) >= 10
  )

  SELECT
      s.user_email,
      s.total_ad_agent_events,
      s.active_days_count,
      s.country_diversity,
      s.city_diversity,
      s.ip_diversity,
      s.device_fingerprint_diversity,
      s.asn_diversity,
      s.primary_country,
      s.primary_city,
      s.primary_ip,
      stats.total_events AS baseline_total_events,
      stats.active_days AS baseline_active_days,
      ROUND(stats.mean_events_per_hour, 4) AS baseline_mean_events_per_hour,
      ROUND(stats.stddev_events_per_hour, 4) AS baseline_stddev_events_per_hour,
      ROUND(stats.mean_ip_diversity_per_hour, 4) AS baseline_mean_ip_diversity_per_hour,
      ROUND(stats.stddev_ip_diversity_per_hour, 4) AS baseline_stddev_ip_diversity_per_hour,
      ROUND(stats.mean_country_diversity_per_hour, 4) AS baseline_mean_country_diversity_per_hour,
      ROUND(stats.stddev_country_diversity_per_hour, 4) AS baseline_stddev_country_diversity_per_hour,
      ROUND(stats.mean_city_diversity_per_hour, 4) AS baseline_mean_city_diversity_per_hour,
      ROUND(stats.stddev_city_diversity_per_hour, 4) AS baseline_stddev_city_diversity_per_hour,
      ROUND(stats.mean_device_diversity_per_hour, 4) AS baseline_mean_device_diversity_per_hour,
      ROUND(stats.stddev_device_diversity_per_hour, 4) AS baseline_stddev_device_diversity_per_hour,
      stats.hours_with_activity AS baseline_hours_with_activity,
      stats.first_event AS baseline_first_event,
      stats.last_event AS baseline_last_event,
      CURRENT_TIMESTAMP AS baseline_updated_at,
      '180days' AS baseline_window
  FROM scalar_features s
  JOIN ad_agent_stats stats ON s.user_email = stats.user_email
  ORDER BY stats.total_events DESC
LogTypeMap:
  PrimaryKey: user_email
  AssociatedLogTypes:
    - LogType: Okta.SystemLog
      Selectors:
        - "$.actor.alternateId"
