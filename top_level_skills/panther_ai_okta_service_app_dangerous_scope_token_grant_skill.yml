  ### Dangerous Scope Reference

  | Scope | Capability |
  |---|---|
  | `okta.users.manage` | Create, update, delete any user; reset passwords; manage profiles |
  | `okta.factors.manage` | Add, update, delete MFA factors for any user |
  | `okta.apps.manage` | Create and modify applications |
  | `okta.groups.manage` | Add/remove users from groups |
  | `okta.policies.manage` | Modify authentication policies |

  ### Risk Assessment

  Evaluate:
  - Was this a sanctioned adversary emulation or unauthorized activity?
  - Was admin consent granted by a legitimate admin or a compromised account?
  - Was the `private_key_jwt` credential recently added (setup for this attack)?
  - Did the service app use the token for destructive actions?
  - Was there a pattern of failed grants before success (indicating attacker iteration)?

