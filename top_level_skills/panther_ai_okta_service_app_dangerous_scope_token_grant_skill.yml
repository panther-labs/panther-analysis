AnalysisType: skill
SkillName: okta_service_app_dangerous_scope_token_grant_skill
DisplayName: Okta Service App Dangerous Scope Token Grant
Description: Use this skill when investigating Okta app.oauth2.token.grant.access_token events where a service application obtained a token via the client_credentials grant type with dangerous management scopes (okta.users.manage, okta.factors.manage, okta.apps.manage, etc.). This fires at capability acquisition — before any destructive action occurs — and complements the okta_service_app_mfa_deletion_skill (which fires after the damage is done). Covers detection, admin consent correlation, source IP investigation, and downstream abuse path analysis.
Prompt: "\n# Okta Service App Dangerous Scope Token Grant\n\nYou are investigating an Okta `app.oauth2.token.grant.access_token` event where a **service application** (not a user) obtained a token via `client_credentials` grant type with administrative management scopes. This is a **pre-exploitation signal** — it fires the moment a service app proves it possesses dangerous API capabilities, before those capabilities are used.\n\n---\n\n## Background: Why This Is High Confidence\n\nOkta supports two types of OAuth2 grants in the context of service apps:\n- **`authorization_code`**: A user logs in interactively. Always produces a token associated with a specific user. Scopes are user-bound (e.g., `okta.users.manage.self`).\n- **`client_credentials`**: A service app authenticates as **itself** — no user involved. The token has no user subject. When this grant returns `okta.users.manage` or `okta.factors.manage`, the app has gained org-wide administrative API access.\n\n**The detection signal:**\n| Field | Malicious | Benign |\n|---|---|---|\n| `eventType` | `app.oauth2.token.grant.access_token` | same |\n| `debugContext:debugData:grantType` | `client_credentials` | `authorization_code` |\n| `debugContext:debugData:grantedScopes` | `okta.users.manage, okta.factors.manage` | `openid, profile, email, ...` |\n| `debugContext:debugData:clientAuthType` | `private_key_jwt` or `client_secret_post` | `none` |\n| `target` array | Access Token only — **no User entry** | Contains both User + Access Token |\n| `client:userAgent:rawUserAgent` | `python-requests`, `curl`, automation | Browser UA |\n\n---\n\n## Step 1: Discover the Schema\n\nBefore querying, retrieve the Okta.SystemLog schema:\n{{tool:panther_ai_log_types_get_schema}}\n\nKey fields for this investigation:\n- `eventType` — filter on `app.oauth2.token.grant.access_token`\n- `debugContext:debugData:grantType` — must be `client_credentials`\n- `debugContext:debugData:grantedScopes` — look for `okta.users.manage`, `okta.factors.manage`, `okta.apps.manage`, `okta.groups.manage`, `okta.policies.manage`\n- `debugContext:debugData:requestedScopes` — what was requested (may differ from granted)\n- `debugContext:debugData:clientAuthType` — `private_key_jwt` = EC keypair; `client_secret_post` = secret\n- `actor:id`, `actor:alternateId`, `actor:displayName` — the service app\n- `client:ipAddress` — source of the token request\n- `client:userAgent:rawUserAgent` — automation tool\n- `outcome:result` — `SUCCESS` for successful grants; also track `FAILURE` to see trial-and-error\n- `target` — for `client_credentials` grants, contains ONLY the Access Token (no User)\n\n---\n\n## Step 2: Detect the Dangerous Scope Grants\n\nQuery for successful `client_credentials` token grants with management scopes:\n\n```sql\nSELECT \n    p_event_time,\n    eventType,\n    displayMessage,\n    actor:id AS actor_id,\n    actor:type AS actor_type,\n    actor:alternateId AS actor_alternate_id,\n    actor:displayName AS actor_display_name,\n    client:ipAddress AS client_ip,\n    client:userAgent:rawUserAgent AS user_agent,\n    outcome:result AS outcome_result,\n    outcome:reason AS outcome_reason,\n    debugContext:debugData:grantType AS grant_type,\n    debugContext:debugData:grantedScopes AS granted_scopes,\n    debugContext:debugData:requestedScopes AS requested_scopes,\n    debugContext:debugData:clientAuthType AS client_auth_type,\n    target,\n    severity\nFROM panther_logs.public.okta_systemlog\nWHERE p_occurs_since('30 d')\n  AND eventType = 'app.oauth2.token.grant.access_token'\n  AND debugContext:debugData:grantType = 'client_credentials'\n  AND outcome:result = 'SUCCESS'\n  AND (\n    debugContext:debugData:grantedScopes LIKE '%okta.users.manage%'\n    OR debugContext:debugData:grantedScopes LIKE '%okta.factors.manage%'\n    OR debugContext:debugData:grantedScopes LIKE '%okta.apps.manage%'\n    OR debugContext:debugData:grantedScopes LIKE '%okta.groups.manage%'\n    OR debugContext:debugData:grantedScopes LIKE '%okta.policies.manage%'\n  )\nORDER BY p_event_time DESC\nLIMIT 50\n```\n\nRecord:\n- **Actor app ID and name** — the service app that obtained the token\n- **Granted scopes** — which management capabilities were acquired\n- **Client auth type** — `private_key_jwt` indicates EC keypair registered; `client_secret_post` indicates shared secret\n- **Source IP** and **user agent**\n- **Timestamps** of each successful grant\n\n---\n\n## Step 3: Check for Failed Attempts Before Success (Attack Refinement Pattern)\n\nLook for `FAILURE` events preceding the successful grant — failed attempts reveal an attacker iterating on their approach:\n\n```sql\nSELECT \n    p_event_time,\n    eventType,\n    actor:id AS actor_id,\n    actor:alternateId AS actor_alternate_id,\n    actor:displayName AS actor_display_name,\n    client:ipAddress AS client_ip,\n    client:userAgent:rawUserAgent AS user_agent,\n    outcome:result AS outcome_result,\n    outcome:reason AS outcome_reason,\n    debugContext:debugData:grantType AS grant_type,\n    debugContext:debugData:requestedScopes AS requested_scopes,\n    debugContext:debugData:clientAuthType AS client_auth_type,\n    severity\nFROM panther_logs.public.okta_systemlog\nWHERE p_occurs_around('<INCIDENT_TIMESTAMP>', '2 h')\n  AND (eventType = 'app.oauth2.token.grant' OR eventType = 'app.oauth2.token.grant.access_token')\n  AND debugContext:debugData:grantType = 'client_credentials'\n  AND (\n    debugContext:debugData:requestedScopes LIKE '%okta.users.manage%'\n    OR debugContext:debugData:requestedScopes LIKE '%okta.factors.manage%'\n    OR debugContext:debugData:requestedScopes LIKE '%okta.apps.manage%'\n    OR debugContext:debugData:requestedScopes LIKE '%okta.groups.manage%'\n    OR debugContext:debugData:requestedScopes LIKE '%okta.policies.manage%'\n  )\nORDER BY p_event_time ASC\nLIMIT 50\n```\n\n**Common failure reasons that indicate attacker iteration:**\n| `outcome:reason` | Meaning |\n|---|---|\n| `unauthorized_client` | App not yet assigned the scope or admin consent not granted |\n| `invalid_application_type_client_credentials` | App type is wrong (e.g., `authorization_code` only) |\n| `invalid_dpop_proof_missing_header` | DPoP required but not provided |\n| `unsupported_auth_method_client_creds` | Wrong client auth method (switching from secret to keypair) |\n\n---\n\n## Step 4: Find Who Granted Admin Consent\n\nThe `client_credentials` grant with `okta.users.manage` or `okta.factors.manage` can ONLY succeed if an admin explicitly granted consent. Find the consent events:\n\n```sql\nSELECT \n    p_event_time,\n    eventType,\n    displayMessage,\n    actor:id AS actor_id,\n    actor:type AS actor_type,\n    actor:alternateId AS actor_alternate_id,\n    actor:displayName AS actor_display_name,\n    client:ipAddress AS client_ip,\n    outcome:result AS outcome_result,\n    target,\n    debugContext:debugData\nFROM panther_logs.public.okta_systemlog\nWHERE p_occurs_around('<INCIDENT_TIMESTAMP>', '4 h')\n  AND (\n    eventType = 'app.oauth2.admin.consent.grant'\n    OR eventType = 'application.lifecycle.create'\n    OR eventType = 'app.oauth2.client.lifecycle.create'\n    OR eventType = 'app.oauth2.credentials.lifecycle.create'\n  )\nORDER BY p_event_time ASC\nLIMIT 50\n```\n\nThis reveals:\n- **Which admin** granted the dangerous scopes\n- **When** the app was registered and credentialed\n- **Whether the app creation and consent happened from the same IP** as the token grant\n\n---\n\n## Step 5: Investigate the Source IP\n\nFor the IP that obtained the token:\n{{tool:panther_ai_general_indicator_check_skill}}\n\nAlso query all activity from this IP in a ±2 hour window:\n\n```sql\nSELECT \n    p_event_time,\n    eventType,\n    displayMessage,\n    actor:id AS actor_id,\n    actor:type AS actor_type,\n    actor:alternateId AS actor_alternate_id,\n    actor:displayName AS actor_display_name,\n    client:ipAddress AS client_ip,\n    outcome:result AS outcome_result,\n    outcome:reason AS outcome_reason,\n    target\nFROM panther_logs.public.okta_systemlog\nWHERE p_occurs_around('<INCIDENT_TIMESTAMP>', '2 h')\n  AND client:ipAddress = '<SOURCE_IP>'\nORDER BY p_event_time ASC\nLIMIT 100\n```\n\n---\n\n## Step 6: Check for Downstream Abuse — What Happened After Token Acquisition?\n\nQuery for MFA deletions, user manipulation, or other malicious activity in the window **after** the token was granted:\n\n```sql\nSELECT \n    p_event_time,\n    eventType,\n    displayMessage,\n    actor:id AS actor_id,\n    actor:type AS actor_type,\n    actor:alternateId AS actor_alternate_id,\n    actor:displayName AS actor_display_name,\n    client:ipAddress AS client_ip,\n    outcome:result AS outcome_result,\n    target,\n    severity\nFROM panther_logs.public.okta_systemlog\nWHERE p_occurs_around('<INCIDENT_TIMESTAMP>', '2 h')\n  AND actor:id = '<SERVICE_APP_ACTOR_ID>'\n  AND p_event_time > '<TOKEN_GRANT_TIMESTAMP>'\nORDER BY p_event_time ASC\nLIMIT 100\n```\n\n**High-priority post-grant events to flag:**\n\n| Event Type | Significance |\n|---|---|\n| `user.mfa.factor.deactivate` | MFA deletion — see `okta_service_app_mfa_deletion_skill` |\n| `user.mfa.factor.activate` | Attacker-controlled factor enrolled |\n| `user.account.update_profile` | User profile manipulation |\n| `user.lifecycle.suspend` / `deactivate` | Account takeover |\n| `system.api_token.create` | Persistent access via API token |\n| `user.authentication.sso` | SSO access to downstream apps |\n| `application.user_membership.add` | Users added to apps |\n\n---\n\n## Step 7: Summarize Findings\n\nPresent a structured summary:\n\n### Attack Chain Position\n\n```mermaid\ngraph LR\n    A[\"App Created<br/>app.lifecycle.create\"] --> B[\"Admin Consent Granted<br/>app.oauth2.admin.consent.grant<br/>okta.users.manage + okta.factors.manage\"]\n    B --> C[\"Token Acquired ← THIS SKILL<br/>app.oauth2.token.grant.access_token<br/>client_credentials + private_key_jwt\"]\n    C --> D[\"MFA Deleted ← okta_service_app_mfa_deletion_skill<br/>user.mfa.factor.deactivate<br/>actor.type = PublicClientAppEntity\"]\n    D --> E[\"Session Created<br/>user.session.start<br/>102 prefix ← okta_legacy_api_auth_no_mfa_skill\"]\n```\n\n### Key Indicators\n\n| Indicator | Value |\n|---|---|\n| Service App Actor ID | |\n| Service App Display Name | |\n| Granted Scopes | |\n| Client Auth Method | |\n| Source IP | |\n| IP Geolocation / Reputation | |\n| User Agent | |\n| Token Grant Timestamp(s) | |\n| Failed Grant Attempts? | |\n| Admin Who Granted Consent | |\n| Post-Grant Abuse Activity | |\n| Downstream Victims | |\n\n### Dangerous Scope Reference\n\n| Scope | Capability |\n|---|---|\n| `okta.users.manage` | Create, update, delete any user; reset passwords; manage profiles |\n| `okta.factors.manage` | Add, update, delete MFA factors for any user |\n| `okta.apps.manage` | Create and modify applications |\n| `okta.groups.manage` | Add/remove users from groups |\n| `okta.policies.manage` | Modify authentication policies |\n\n### Risk Assessment\n\nEvaluate:\n- Was this a sanctioned adversary emulation or unauthorized activity?\n- Was admin consent granted by a legitimate admin or a compromised account?\n- Was the `private_key_jwt` credential recently added (setup for this attack)?\n- Did the service app use the token for destructive actions?\n- Was there a pattern of failed grants before success (indicating attacker iteration)?\n\n### MITRE ATT&CK Mapping\n\n| Technique | Description |\n|---|---|\n| **T1550.001** | Use Alternate Authentication Material: Application Access Token |\n| **T1078.004** | Valid Accounts: Cloud Accounts |\n| **T1098** | Account Manipulation |\n| **T1556.006** | Modify Authentication Process: Multi-Factor Authentication |\n\n---\n\n## Detection Rule Logic\n\n```python\nDANGEROUS_SCOPES = [\n    'okta.users.manage',\n    'okta.factors.manage',\n    'okta.apps.manage',\n    'okta.groups.manage',\n    'okta.policies.manage',\n]\n\ndef rule(event):\n    \"\"\"\n    Detects Okta service app token grants via client_credentials with dangerous management scopes.\n    \n    The signal fires at capability acquisition — as soon as a service app proves it holds\n    org-wide administrative access. This precedes any destructive use of that access.\n    \n    Key schema notes for Okta.SystemLog:\n    - Grant type is nested at: debugContext.debugData.grantType\n    - Granted scopes are nested at: debugContext.debugData.grantedScopes (comma-separated string)\n    - For client_credentials grants, 'target' contains only the Access Token — no User entry\n    \"\"\"\n    if event.get('eventType') != 'app.oauth2.token.grant.access_token':\n        return False\n    if event.deep_get('outcome', 'result') != 'SUCCESS':\n        return False\n    grant_type = event.deep_get('debugContext', 'debugData', 'grantType') or ''\n    if grant_type != 'client_credentials':\n        return False\n    granted_scopes = event.deep_get('debugContext', 'debugData', 'grantedScopes') or ''\n    return any(scope in granted_scopes for scope in DANGEROUS_SCOPES)\n\ndef title(event):\n    app_name = event.deep_get('actor', 'displayName') or 'Unknown App'\n    app_id = event.deep_get('actor', 'alternateId') or event.deep_get('actor', 'id') or 'unknown'\n    scopes = event.deep_get('debugContext', 'debugData', 'grantedScopes') or 'unknown scopes'\n    ip = event.deep_get('client', 'ipAddress') or 'unknown IP'\n    return f\"Okta Service App Dangerous Scope Grant: {app_name} ({app_id}) acquired [{scopes}] from {ip}\"\n\ndef severity(event):\n    granted_scopes = event.deep_get('debugContext', 'debugData', 'grantedScopes') or ''\n    # Critical scopes: direct user and factor management (enables MFA deletion chain)\n    if 'okta.users.manage' in granted_scopes or 'okta.factors.manage' in granted_scopes:\n        return 'HIGH'\n    return 'MEDIUM'\n\ndef alert_context(event):\n    return {\n        'app_actor_id': event.deep_get('actor', 'id'),\n        'app_alternate_id': event.deep_get('actor', 'alternateId'),\n        'app_name': event.deep_get('actor', 'displayName'),\n        'granted_scopes': event.deep_get('debugContext', 'debugData', 'grantedScopes'),\n        'requested_scopes': event.deep_get('debugContext', 'debugData', 'requestedScopes'),\n        'client_auth_type': event.deep_get('debugContext', 'debugData', 'clientAuthType'),\n        'source_ip': event.deep_get('client', 'ipAddress'),\n        'user_agent': event.deep_get('client', 'userAgent', 'rawUserAgent'),\n    }\n```\n\n**Tuning note:** All `client_credentials` grants returning management scopes are suspicious — there are very few legitimate production use cases for `okta.users.manage` or `okta.factors.manage` via unattended service auth. If you have known automation, allowlist by `actor:id` (the app ID).\n\n---\n\n## Notes on Schema\n\nAll detection-relevant fields are in `debugContext:debugData`:\n- **Grant type**: `debugContext:debugData:grantType` — `client_credentials` vs `authorization_code`\n- **Granted scopes**: `debugContext:debugData:grantedScopes` — comma-separated string\n- **Requested scopes**: `debugContext:debugData:requestedScopes` — what was asked for\n- **Client auth type**: `debugContext:debugData:clientAuthType` — `private_key_jwt` (EC keypair) or `client_secret_post`\n\nFor `client_credentials` grants, the `target` array **never contains a User entry** — only the Access Token itself with no `subject` field. This structural absence of a user in the target is a reliable machine-token fingerprint.\n"
