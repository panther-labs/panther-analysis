DisplayName: "Okta Service App MFA Deletion Investigation"
Description: "Use this skill when investigating Okta MFA/factor deletion events performed by a service application (actor.type = PublicClientAppEntity). This covers the full investigation workflow: detecting the deletion event, profiling the service app actor, investigating the source IP, examining preceding setup activity (app creation, OAuth consent grants), and summarizing what happened before and after the factor removal."
Prompt: |
  # Okta Service App MFA Deletion Investigation Skill

  You are investigating an Okta MFA deletion event performed by a **service application** (actor.type = `PublicClientAppEntity`). Follow this step-by-step workflow.

  ---

  ## Step 1: Discover the Schema

  Before querying, retrieve the Okta.SystemLog schema:
  {{tool:panther_ai_log_types_get_schema}}

  Key fields for this investigation:
  - `actor:type` — filter on `PublicClientAppEntity`
  - `actor:id`, `actor:displayName`, `actor:alternateId`
  - `client:ipAddress`
  - `eventType` — target `user.mfa.factor.deactivate`
  - `outcome:result`, `outcome:reason`
  - `target` — the victim user
  - `p_event_time`

  ---

  ## Step 2: Detect the MFA Deletion Events

  Query for all `user.mfa.factor.deactivate` events where `actor:type = 'PublicClientAppEntity'` in the relevant time window (default: last 30 days):

  ```sql
  SELECT
      p_event_time,
      eventType,
      displayMessage,
      actor:id AS actor_id,
      actor:type AS actor_type,
      actor:alternateId AS actor_alternate_id,
      actor:displayName AS actor_display_name,
      client:ipAddress AS client_ip,
      client:geographicalContext:city AS city,
      client:geographicalContext:country AS country,
      outcome:result AS outcome_result,
      outcome:reason AS outcome_reason,
      target,
      severity
  FROM panther_logs.public.okta_systemlog
  WHERE p_occurs_since('30 d')
    AND actor:type = 'PublicClientAppEntity'
    AND eventType = 'user.mfa.factor.deactivate'
  ORDER BY p_event_time DESC
  LIMIT 50
  ```

  Record:
  - **Actor ID** (the service app ID)
  - **Actor display name**
  - **Client IP address**
  - **Target user(s)** (victim accounts whose MFA was removed)
  - **Factor types** reset (from `outcome:reason`)
  - **Timestamp** of the deletions

  ---

  ## Step 3: Investigate the Source IP

  For each IP associated with the MFA deletion:
  {{tool:panther_ai_general_indicator_check_skill}}

  Also look at **all activity from this IP** in a ±2 hour window around the incident:

  ```sql
  SELECT
      p_event_time,
      eventType,
      displayMessage,
      actor:id AS actor_id,
      actor:type AS actor_type,
      actor:alternateId AS actor_alternate_id,
      actor:displayName AS actor_display_name,
      client:ipAddress AS client_ip,
      outcome:result AS outcome_result,
      outcome:reason AS outcome_reason,
      target,
      severity
  FROM panther_logs.public.okta_systemlog
  WHERE p_occurs_around('<INCIDENT_TIMESTAMP>', '2 h')
    AND client:ipAddress = '<SOURCE_IP>'
  ORDER BY p_event_time ASC
  LIMIT 100
  ```

  ---

  ## Step 4: Examine Preceding Events (Setup Activity)

  Look for setup activity that enabled the service app to perform MFA deletion. Key patterns to search for **before** the deletion timestamp on the same IP or by the same admin user:

  - `application.lifecycle.create` — new OAuth2 app created
  - `app.oauth2.client.lifecycle.create` — service/public client app registered
  - `app.oauth2.admin.consent.grant` — admin granted `okta.factors.manage` scope
  - `app.oauth2.credentials.lifecycle.create` — client secret or keypair created
  - `application.user_membership.add` — victim added to app
  - `app.oauth2.token.grant` FAILURE events — attacker testing authentication methods

  Critical consent scopes to flag:
  - `okta.factors.manage` — allows MFA factor management
  - `okta.users.manage` — allows user account manipulation

  ---

  ## Step 5: Examine Following Events (Post-Deletion Impact)

  Query for all activity involving the **victim user** after the MFA deletion:

  ```sql
  SELECT
      p_event_time,
      eventType,
      displayMessage,
      actor:id AS actor_id,
      actor:type AS actor_type,
      actor:alternateId AS actor_alternate_id,
      actor:displayName AS actor_display_name,
      client:ipAddress AS client_ip,
      outcome:result AS outcome_result,
      outcome:reason AS outcome_reason,
      target,
      severity
  FROM panther_logs.public.okta_systemlog
  WHERE p_occurs_around('<INCIDENT_TIMESTAMP>', '2 h')
    AND ARRAY_CONTAINS('<VICTIM_EMAIL>'::variant, p_any_usernames)
  ORDER BY p_event_time ASC
  LIMIT 100
  ```

  Look for:
  - `policy.evaluate_sign_on` with `outcome_reason = 'Sign-on policy evaluation resulted in ENROLL'` — victim forced to re-enroll (MFA gap window)
  - `user.mfa.factor.activate` — new MFA factor enrolled (attacker-controlled device?)
  - `device.user.add` — new device registered
  - `user.session.start` / `user.authentication.sso` — access during MFA gap window
  - New IP addresses used after factor re-enrollment

  ---

  ## Step 6: Summarize Findings

  Present a structured summary with:

  ### Attack Chain Timeline
  Use a Mermaid timeline diagram showing key events from app creation through MFA deletion through post-deletion activity.

  ### Key Indicators
  | Indicator | Value |
  |---|---|
  | Service App Actor ID | |
  | Service App Display Name | |
  | Source IP | |
  | IP Geolocation | |
  | Admin Who Created App | |
  | OAuth Scopes Granted | |
  | Victim User(s) | |
  | Factors Deleted | |
  | MFA Gap Window | |
  | New Device Enrolled | |
  | Post-Deletion Access | |

  ### Risk Assessment
  Evaluate:
  - Was this a sanctioned adversary emulation or unauthorized activity?
  - Were `okta.factors.manage` + `okta.users.manage` admin consents granted by a legitimate admin?
  - Was the victim's MFA re-enrolled on a known vs. unknown device/IP?
  - Was there any access to sensitive apps during the MFA gap window?

  ### MITRE ATT&CK Mapping
  - **T1556.006** — Modify Authentication Process: Multi-Factor Authentication
  - **T1098** — Account Manipulation
  - **T1550.001** — Use Alternate Authentication Material: Application Access Token

  ---

  ## Notes on Detection Logic

  When building a Panther rule to detect this:
  ```python
  def rule(event):
      return (
          event.get('eventType') == 'user.mfa.factor.deactivate'
          and event.deep_get('actor', 'type') == 'PublicClientAppEntity'
      )
  ```

  Alert fields to surface:
  - `actor.displayName` — the service app name
  - `actor.id` — service app ID
  - `client.ipAddress` — source IP
  - `target[0].alternateId` — victim user email
  - `outcome.reason` — which factor type was deleted
