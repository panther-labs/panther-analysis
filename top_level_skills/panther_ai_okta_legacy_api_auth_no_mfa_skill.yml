  ### Risk Assessment

  Evaluate:
  - Is this a sanctioned automation script or attacker tooling?
  - Was MFA intentionally bypassed or is this a legacy policy gap?
  - Did the actor access sensitive resources during the session?
  - Was a persistent access mechanism (API token, new factor) created?
  - Was the legacy global session policy recently modified to allow 1FA?

