  ## Detection Rule Logic

  ```python
  def rule(event):
      """
      Detects Okta session creation via legacy API (/api/v1/authn) without MFA challenge.
      Legacy sessions use '102' prefix session IDs vs Identity Engine 'idx' prefix.
      These sessions bypass the modern CHALLENGE → MFA → ALLOW authentication flow.
      """
      if event.get('eventType') != 'user.session.start':
          return False
      if event.deep_get('outcome', 'result') != 'SUCCESS':
          return False
      session_id = event.deep_get('authenticationContext', 'externalSessionId') or ''
      return session_id.startswith('102')

  def title(event):
      user = event.deep_get('actor', 'alternateId') or 'unknown user'
      ip = event.deep_get('client', 'ipAddress') or 'unknown IP'
      ua = event.deep_get('client', 'userAgent', 'rawUserAgent') or 'unknown client'
      return f"Okta Legacy API Auth Without MFA: {user} from {ip} [{ua}]"

  def severity(event):
      ua = (event.deep_get('client', 'userAgent', 'rawUserAgent') or '').lower()
      # Elevate if non-browser automation tool
      automation_keywords = ['python', 'curl', 'requests', 'powershell', 'urllib', 'okta-sdk']
      if any(kw in ua for kw in automation_keywords):
          return 'HIGH'
      return 'MEDIUM'

  def alert_context(event):
      return {
          'actor': event.deep_get('actor', 'alternateId'),
          'actor_id': event.deep_get('actor', 'id'),
          'source_ip': event.deep_get('client', 'ipAddress'),
          'user_agent': event.deep_get('client', 'userAgent', 'rawUserAgent'),
          'session_id': event.deep_get('authenticationContext', 'externalSessionId'),
          'client_device': event.deep_get('client', 'device'),
      }
  ```

  **Key alert context to surface:** actor email, source IP, user agent, session ID, and client device type.

  ---

  ## Notes

  - **Not all `102` sessions are malicious** — some are legitimate server-side integrations using the legacy API. Tune by allowlisting known service account IDs or IP ranges.
  - The **legacy global session policy** (Okta Classic policy type `OktaSignOn`) governs these sessions. If the policy rule `policyRuleFactorMode = '1FA'`, MFA is not required.
  - **Remediation:** Migrate to Identity Engine, enforce MFA on legacy global session policies, or block legacy `/api/v1/authn` API access entirely.
