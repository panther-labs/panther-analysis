Description: "Use this skill when investigating Okta user.session.start events where authentication occurred via the legacy API (/api/v1/authn) without an MFA challenge. The fingerprint is: session ID starting with '102' (not 'idx'), policy.evaluate_sign_on outcome = ALLOW (not CHALLENGE), no preceding user.authentication.auth_via_mfa event, and often a non-browser user agent (e.g., python-requests). This covers detection, triage, and post-authentication impact analysis."
Prompt: |
  # Okta Legacy API Authentication Without MFA Challenge

  You are investigating an Okta session that was authenticated through the **legacy `/api/v1/authn` API** without completing an MFA challenge. Follow this step-by-step workflow.

  ---

  ## Background: The Detection Signal

  Okta uses two distinct authentication pipelines:
  - **Identity Engine (modern):** Session IDs start with `idx`. Users go through a CHALLENGE flow — `policy.evaluate_sign_on` returns `CHALLENGE`, followed by `user.authentication.auth_via_mfa`, then `user.session.start`.
  - **Legacy API (`/api/v1/authn`):** Session IDs start with `102`. Authentication may bypass MFA if a legacy global session policy allows 1FA. The `policy.evaluate_sign_on` event returns `ALLOW` immediately, with **no** `user.authentication.auth_via_mfa` event in the chain.

  **The key fingerprint:**
  | Field | Legacy API (suspicious) | Identity Engine (normal) |
  |---|---|---|
  | `authenticationContext:externalSessionId` | Starts with `102` | Starts with `idx` |
  | `policy.evaluate_sign_on outcome` | `ALLOW` (no challenge) | `CHALLENGE` → `ALLOW` |
  | `user.authentication.auth_via_mfa` | **Absent** | Present before session.start |
  | `client:userAgent:rawUserAgent` | Often `python-requests`, `curl`, or automation | Browser User-Agent |
  | `client:device` | Often `Unknown` | `Computer` or `Mobile` |
  | `target` in `user.session.start` | Often `null` | Contains AppInstance |

  ---

  ## Step 1: Discover the Schema

  Before querying, retrieve the Okta.SystemLog schema:
  {{tool:panther_ai_log_types_get_schema}}

  Key fields for this investigation:
  - `authenticationContext:externalSessionId` — session ID; `102` prefix = legacy API
  - `eventType` — filter on `user.session.start`, `user.authentication.auth_via_mfa`, `policy.evaluate_sign_on`
  - `outcome:result` — `ALLOW` without preceding `CHALLENGE` = MFA bypass
  - `client:userAgent:rawUserAgent` — identify automation tools
  - `client:device` — `Unknown` = non-browser client
  - `actor:alternateId`, `actor:id` — victim user identity
  - `client:ipAddress` — source of authentication

  ---

  ## Step 2: Find Legacy API Sessions Without MFA

  Query for `user.session.start` events where the session ID uses the legacy `102` prefix:

  ```sql
  SELECT
      p_event_time,
      actor:alternateId AS actor_email,
      actor:displayName AS actor_name,
      actor:type AS actor_type,
      client:ipAddress AS client_ip,
      client:userAgent:rawUserAgent AS user_agent,
      client:device AS client_device,
      authenticationContext:externalSessionId AS session_id,
      authenticationContext:authenticationProvider AS auth_provider,
      outcome:result AS outcome_result,
      outcome:reason AS outcome_reason,
      target
  FROM panther_logs.public.okta_systemlog
  WHERE p_occurs_since('30 d')
    AND eventType = 'user.session.start'
    AND outcome:result = 'SUCCESS'
    AND authenticationContext:externalSessionId LIKE '102%'
  ORDER BY p_event_time DESC
  LIMIT 50
  ```

  Record:
  - **Victim user(s)** — who authenticated via legacy API
  - **Source IP** — where the authentication came from
  - **User agent** — what client tool was used (e.g., `python-requests`)
  - **Session ID** — full `102...` value for follow-on queries
  - **Timestamp** — when the session was established

  ---

  ## Step 3: Confirm No MFA in the Authentication Chain

  For each suspicious session, verify there is **no** `user.authentication.auth_via_mfa` event associated with it:

  ```sql
  SELECT
      p_event_time,
      eventType,
      displayMessage,
      actor:alternateId AS actor_email,
      client:ipAddress AS client_ip,
      client:userAgent:rawUserAgent AS user_agent,
      authenticationContext:externalSessionId AS session_id,
      authenticationContext:credentialProvider AS cred_provider,
      authenticationContext:credentialType AS cred_type,
      outcome:result AS outcome_result,
      outcome:reason AS outcome_reason,
      target
  FROM panther_logs.public.okta_systemlog
  WHERE p_occurs_around('<SESSION_START_TIMESTAMP>', '10 m')
    AND authenticationContext:externalSessionId = '<SESSION_ID>'
  ORDER BY p_event_time ASC
  LIMIT 50
  ```

  **Expected pattern for a confirmed bypass:**
  1. `user.authentication.verify` → `SUCCESS` (identity confirmed via password only)
  2. `policy.evaluate_sign_on` → `ALLOW` with reason `"Sign-on policy evaluation resulted in ALLOW"` (NOT `CHALLENGE`)
  3. `user.session.start` → `SUCCESS` (target: null, no app context)
  4. **No** `user.authentication.auth_via_mfa` event anywhere in the chain

  **Contrast with a normal session:**
  1. `policy.evaluate_sign_on` → `CHALLENGE`
  2. `user.authentication.auth_via_mfa` → `SUCCESS` (MFA passed)
  3. `user.session.start` → `SUCCESS`

  ---

  ## Step 4: Profile the Source IP

  For each IP associated with a legacy API authentication:
  {{tool:panther_ai_general_indicator_check_skill}}

  Also review **all Okta activity from this IP** in a ±2 hour window:

  ```sql
  SELECT
      p_event_time,
      eventType,
      displayMessage,
      actor:alternateId AS actor_email,
      actor:type AS actor_type,
      client:ipAddress AS client_ip,
      client:userAgent:rawUserAgent AS user_agent,
      authenticationContext:externalSessionId AS session_id,
      outcome:result AS outcome_result,
      outcome:reason AS outcome_reason,
      target
  FROM panther_logs.public.okta_systemlog
  WHERE p_occurs_around('<SESSION_START_TIMESTAMP>', '2 h')
    AND client:ipAddress = '<SOURCE_IP>'
  ORDER BY p_event_time ASC
  LIMIT 100
  ```

  ---

  ## Step 5: Examine Post-Authentication Activity

  Determine what the attacker did after establishing the session. Query all activity in the session:

  ```sql
  SELECT
      p_event_time,
      eventType,
      legacyEventType,
      displayMessage,
      actor:alternateId AS actor_email,
      client:ipAddress AS client_ip,
      client:userAgent:rawUserAgent AS user_agent,
      authenticationContext:externalSessionId AS session_id,
      outcome:result AS outcome_result,
      outcome:reason AS outcome_reason,
      target
  FROM panther_logs.public.okta_systemlog
  WHERE p_occurs_around('<SESSION_START_TIMESTAMP>', '4 h')
    AND authenticationContext:externalSessionId = '<SESSION_ID>'
  ORDER BY p_event_time ASC
  LIMIT 100
  ```

  **High-value post-authentication events to look for:**

  | Event Type | Significance |
  |---|---|
  | `user.account.update_profile` | Profile manipulation |
  | `user.mfa.factor.deactivate` | MFA removal via API |
  | `user.mfa.factor.activate` | Attacker-controlled factor enrolled |
  | `app.oauth2.token.grant` | Token obtained for downstream access |
  | `system.api_token.create` | Persistent API access established |
  | `user.authentication.sso` | SSO access to downstream apps |
  | `application.user_membership.add` | User added to applications |
  | `user.lifecycle.suspend` / `deactivate` | Account takeover actions |
  | `device.user.add` | New device registered |

  ---

  ## Step 6: Check for Scope — Other Users on Same IP

  Determine if this is a targeted attack or broader campaign:

  ```sql
  SELECT
      actor:alternateId AS actor_email,
      COUNT(DISTINCT authenticationContext:externalSessionId) AS legacy_session_count,
      ARRAY_AGG(DISTINCT authenticationContext:externalSessionId) AS session_ids,
      MIN(p_event_time) AS first_seen,
      MAX(p_event_time) AS last_seen
  FROM panther_logs.public.okta_systemlog
  WHERE p_occurs_since('30 d')
    AND eventType = 'user.session.start'
    AND outcome:result = 'SUCCESS'
    AND authenticationContext:externalSessionId LIKE '102%'
    AND client:ipAddress = '<SOURCE_IP>'
  GROUP BY actor_email
  ORDER BY first_seen DESC
  LIMIT 50
  ```

