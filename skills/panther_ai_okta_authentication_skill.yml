Prompt: |
  # Okta Authentication: Sessions, OAuth Tokens, and Scopes

  Reusable knowledge for any Okta authentication investigation — interactive sign-in, OAuth token grants, admin scopes, and MFA factor events.

  Okta authentication has two pipelines: **interactive user sign-in** (produces `user.authentication.*`, `policy.evaluate_sign_on`, `user.session.start`, all sharing one `authenticationContext.externalSessionId`) and **machine OAuth token grants** (produces `app.oauth2.token.grant.access_token`; no user session).

  ## Sign-in chain

  Chronological order: `user.authentication.verify` -> `policy.evaluate_sign_on` (returns `CHALLENGE` or `ALLOW`) -> `user.authentication.auth_via_mfa` (only on CHALLENGE) -> `user.session.start`.

  Session ID prefix `idx` = modern Identity Engine; `102` = Legacy `/api/v1/authn`, which can bypass MFA when legacy policy permits 1FA. A `102` session with `ALLOW` policy outcome and no `auth_via_mfa` in the chain is the MFA-bypass fingerprint.

  ## OAuth grants

  Grant types: `client_credentials` (app authenticates as itself, no user subject — the only grant where dangerous scopes mean org-wide admin access); `authorization_code` / `refresh_token` / `password` are user-bound.

  Grant detail nests under `debugContext.debugData` (`grantType`, `grantedScopes`, `requestedScopes`, `clientAuthType`); re-keyed as `debug_context` in `okta_alert_context`. For `client_credentials`, the `target` array has only the Access Token (no User entry) — a reliable machine-token fingerprint.

  Repeated `FAILURE` `app.oauth2.token.grant` events from the same actor or IP before a successful grant suggest attacker iteration on app type, scope assignment, or auth method.

  ## Admin scopes

  Dangerous service-app scopes: `okta.users.manage`, `okta.factors.manage`, `okta.apps.manage`, `okta.groups.manage`, `okta.policies.manage` — the first two enable account-takeover chains. Each has a `.self` variant scoped to the calling user only; treat `.self` as benign.

  `grantedScopes` is a comma-separated string — substring matching is unsafe (`okta.users.manage` substring-matches `okta.users.manage.self`). Tokenize on commas and exact-match. In SQL: Snowflake `RLIKE '(.*, )?okta[.]users[.]manage(,.*)?'`.

  ## MFA factor events

  Factor lifecycle events: `user.mfa.factor.activate` (enroll), `.deactivate` (remove), `.suspend` / `.unsuspend`, `.reset_all`. The factor type (FIDO_WEBAUTHN, OKTA_VERIFY_PUSH, OKTA_VERIFY_TOTP, SMS, CALL, GOOGLE_OTP) is named in `outcome.reason`.

  Attribution: `"User reset X factor"` in `outcome.reason` = user-initiated (typically benign self-service); `"Reset factor for user"` (no `User reset` prefix) = removed by someone else (admin actor, or service app holding `okta.factors.manage`).

  The window between `deactivate` and the next `activate` is the MFA gap — `user.session.start` or `user.authentication.sso` during this window indicates exploitation. The attacker's typical next move after deleting a victim's factor is enrolling their own (often from a new IP), so the activate itself is signal.

  ## Available saved queries

  - `Okta Fired Alerts By Rule` — fired signals for a specific RuleID. Substitute `<RULE_ID>` and `<WINDOW>`. Entry point for any rule-driven investigation; `p_alert_context` carries actor, client, target, outcome.
  - `Okta Actor Activity` — all `okta_systemlog` events for a given `actor.id` in a window. Substitute `<ACTOR_ID>` and `<WINDOW>`. Works for users and service apps; layer further filters as needed.
  - `Okta Source IP Activity` — all `okta_systemlog` events from a given source IP in a window. Substitute `<IP>` and `<WINDOW>`. Use to assess campaign breadth or identify shared automation infrastructure.
  - `Okta Investigate Session ID Activity` — reconstruct a session's full event chain by `authenticationContext.externalSessionId` (uncomment the session filter line in the SQL).
